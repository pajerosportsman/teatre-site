<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Театр "Афишинг"</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script
    widget-key="563aa974-9fcc-4e35-aaac-ba3efaa8aec7"
    src="https://afisha.ru/w/afishaWidgetManager.global.js"
  ></script>

  <style>
    .show-card { transition: 0.2s; }
    .show-card:hover { transform: translateY(-3px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }

    .date-btn {
      display:inline-flex;
      flex-direction:column;
      align-items:center;
      padding:6px 12px;
      border:1px solid #dc2626;
      border-radius:8px;
      color:#dc2626;
      font-size:12px;
      cursor:pointer;
    }
    .date-btn:hover { background:#dc2626; color:white; }

    .tag {
      font-size:11px;
      padding:2px 8px;
      border-radius:999px;
      background:#fee2e2;
      color:#dc2626;
    }

    .card-img { width:100%; height:200px; object-fit:cover; }
  </style>
</head>

<body class="bg-gray-100">

<header class="bg-black text-white p-6 text-center text-2xl font-bold">
  Театр "Афишинг"
</header>

<section class="max-w-6xl mx-auto px-4 py-12">
  <h2 class="text-2xl font-bold mb-6 text-center">Репертуар</h2>
  <div id="grid" class="grid md:grid-cols-3 gap-6"></div>
</section>

<script>
/* ================= CONFIG ================= */

const API_URL = 'ВСТАВЬ_API_ССЫЛКУ_СЮДА';
const CACHE_KEY = 'afisha_cache';
const CACHE_TTL = 24 * 60 * 60 * 1000;

let SHOWS = [];

/* ================= API ================= */

async function loadSchedule() {
  const cached = localStorage.getItem(CACHE_KEY);

  if (cached) {
    const parsed = JSON.parse(cached);
    if (Date.now() - parsed.time < CACHE_TTL) {
      return parsed.data;
    }
  }

  const res = await fetch(API_URL);
  const data = await res.json();

  localStorage.setItem(CACHE_KEY, JSON.stringify({
    time: Date.now(),
    data
  }));

  return data;
}

/* ================= TRANSFORM ================= */

function transform(data) {
  const map = {};

  data.forEach(item => {
    const key = item.show_id;

    if (!map[key]) {
      map[key] = {
        title: item.name,
        description: item.desc || 'Описание скоро появится',
        image: item.image,
        age: item.age_limit ? item.age_limit + '+' : null,
        dates: []
      };
    }

    const d = new Date(item.date);

    map[key].dates.push({
      label: d.toLocaleDateString('ru-RU', { day:'numeric', month:'short' }),
      time: d.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' }),
      id: item.id
    });
  });

  return Object.values(map);
}

/* ================= WIDGET ================= */

function openSession(id) {
  widgetManager.appendWidget({
    widgetKey: '563aa974-9fcc-4e35-aaac-ba3efaa8aec7',
    route: 'session',
    embedType: 'modal',
    sessionId: id
  }, document.body);
}

/* ================= RENDER ================= */

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  SHOWS.forEach(show => {
    const card = document.createElement('div');
    card.className = 'show-card bg-white rounded-xl overflow-hidden shadow';

    const img = document.createElement('img');
    img.src = show.image;
    img.className = 'card-img';

    const body = document.createElement('div');
    body.className = 'p-4 flex flex-col';

    const title = document.createElement('h3');
    title.className = 'font-bold mb-2';
    title.textContent = show.title;

    const desc = document.createElement('p');
    desc.className = 'text-sm text-gray-500 mb-3';
    desc.textContent = show.description;

    const dates = document.createElement('div');
    dates.className = 'flex flex-wrap gap-2 mt-auto';

    show.dates.slice(0,4).forEach(d => {
      const btn = document.createElement('button');
      btn.className = 'date-btn';
      btn.innerHTML = `${d.label}<span>${d.time}</span>`;
      btn.onclick = () => openSession(d.id);
      dates.appendChild(btn);
    });

    body.appendChild(title);
    body.appendChild(desc);
    body.appendChild(dates);

    card.appendChild(img);
    card.appendChild(body);

    grid.appendChild(card);
  });
}

/* ================= INIT ================= */

async function init() {
  if (typeof widgetManager === 'undefined') {
    setTimeout(init, 100);
    return;
  }

  try {
    const data = await loadSchedule();
    SHOWS = transform(data);
    render();
  } catch (e) {
    console.error('Ошибка:', e);
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
